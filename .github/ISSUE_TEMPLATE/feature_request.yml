name: Feature Request
description: 提出一个功能建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请描述你希望添加的功能。

  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 你遇到了什么问题？这个功能要解决什么痛点？
      placeholder: 每次安装都需要手动配置 MCP，很麻烦...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望如何解决这个问题？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他替代方案？

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 任何有助于理解需求的额外信息
